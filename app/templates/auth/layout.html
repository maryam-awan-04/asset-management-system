<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sign in · Asset Management{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">
</head>
<body class="auth-page-body">
  <div class="auth-shell">
    <div class="auth-card{% block auth_card_extra_class %}{% endblock %}">
      <aside class="auth-brand" aria-hidden="false">
        <div class="auth-brand-inner">
          <i class="bi bi-box-seam auth-brand-icon" aria-hidden="true"></i>
          <p class="auth-brand-title">IT Asset Management</p>
        </div>
      </aside>
      <section class="auth-form-panel">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% set flash_extra_class = "mb-3" %}
          {% include "_flash_messages.html" %}
        {% endwith %}
        {% block auth_content %}{% endblock %}
        {% if request.endpoint != "auth.login" %}
          <p class="auth-home-link mt-4 mb-0 text-center">
            <a href="{{ url_for('auth.login') }}" class="text-decoration-none">&larr; Sign in</a>
          </p>
        {% endif %}
      </section>
    </div>
  </div>
</body>
</html>
