{% extends "base.html" %}
{% block title %}Add asset · Asset Management{% endblock %}
{% block body %}
  <div class="page-card page-card--wide">
    <div class="page-card-inner">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="hero-title display-6 mb-0">Add Asset</h1>
        <a class="btn btn-outline-secondary" href="{{ url_for('assets.list_assets') }}">Back to all assets</a>
      </div>

      <form method="post" novalidate class="assets-form" style="max-width: 40rem;">
        {{ form.hidden_tag() }}
        {% include "assets/_form_fields.html" %}
        <div class="d-flex flex-wrap gap-2">
          {{ form.submit(class="btn btn-brand") }}
          <a class="btn btn-outline-secondary" href="{{ url_for('assets.list_assets') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
